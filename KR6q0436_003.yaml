body:
  text: 住開縣棲靈寺門人完矩録書問與瑞環陳居士雪山老子常言一切衆生具有如來智慧德相此老子一片苦心徹底要人當下寤去而人只不肯盍忽於平常返欲務高求深良可歎也公肯信此言之切而當下寤去否如不能切須留神不可甘為經史耽誤平生前之人即塵勞中做去者有之即潔白中做去者亦有之第塵勞中拔出為百當千了者常十一而潔白中得來為百當千了者常十九此輕重之效也能於二處做得去此又真火中蓮丈夫漢也山僧在荊南煙霧中回首夔門儼在天上安能與公把臂快談乎為道自佳餘不備與笑一法師湘南領衆刻不容離何能謀面談鄉井中清話直令人隱隱作凌雲想耳聞足下論法華於天門而深固幽遠之寶所當陽道出參請輩覿面相承余實躍然無休也遣人趨座拾取毒言不識足下毒腸以為何如附後小偈靈山未散語何真栗棘吞來怕殺人竹杖同君歸錦里鑾師席上醉華春復笑一法師附來書至人應運古佛為心終不以譏刺愛譽為二而來教長箋批答分析過當詞氣少貶詎非夫子有蓬之心也邪足下大見何薄且陋乎前之人擊塗毒鼓灑甘露漿莖草見瓊樓須彌置芥孔固非淺見可能測度然余猶少羡於足下者盍鑒祖鑾師皆出吾蜀疑足下亦其人之流亞實用繾綣待以智者又譽以毒言毒腸及小偈云云孰知只泛泛一支講人實未夢見實際理耳既非種草似不當論而武陵龍孝若常言足下曾見雲門和尚素有良遂敲門之勤今來諭鄙辱殆盡誠白面書生之淺見能不錯會余相愛者就來諭而試一論之先德常言是賊識賊足下不妄稱誤作亂吼爭光安知人妄稱誤作亂吼爭光乎然不知此種種亦何常不入正受不是妙理所謂與諸勞侶同一手作倘學不如此不無師子咬人韓盧逐塊實可憐憫者至於太虛妙體西氏丰神不令稚子管窺醜婦顰效余恐羊質虎皮雞心鳳狀大為人所笑也噫足下識見只合美以紅蓮舌白玉齒不合稱以毒言語毒心腸烏乎醍醐上味為世所珍遇此等人翻成毒藥有旨哉有旨哉草昧世界機智人心魚目妄稱明珠山雞誤作彩鳳碔砆與白璧爭光狐狸同獅子亂吼良可嘆也豫不欲以太虛妙體受稚子管窺西氏丰神令醜婦顰效於是偕二三好音嘯傲於煙雲之上五十知非養恬於丘壑之中乃豫拙計也聞老和尚於深山窮谷而棒喝交馳費精殫神而平常少會非大手段大力量者不能豫欲向癡人前說夢恐釋迦老子笑我也忽接來教大章大書未必出自老和尚親手而中閒語句恐門弟子向口角邊取録也感謝感謝俟遲特謀一晤方面布不悉復若明請住德山鑒祖老人唱龍潭宗旨於是山每接納四來棒如雨點亦如燒尾辟歷幾七百年絶無繼此席者而是山七百年竟寥寥耳上座既惜此席久虛乃有是命欲山野極力扶持其見可謂偉矣但山野適有芰荷衣松華食之想其志既堅似難回策上座的欲完此段公案亦應待其時待其人而不可草草光景當亦如鐵而老子斷盡人知解不惟不愧老人亦不辱足下知人之纍復亮西堂啓教授正欲走金雞尋二公談還鄉曲與物不遷之旨何期先辱華札字字珠璣誠得我悟師翁棒頭消息者也山野寧不羡且賀哉手教問山僧在萬峰時事萬峰唯打幾頓絶無物與人臨濟兒孫何堪預數二公過譽使汗下浹背也邀住金雞即當如命完此口願第方退藥山院而諸剎皆有命以我病足未得少瘳安能一一酬之然金雞雖不能久住當必過看作三日談耳不盡欲言復李修吉居士來楚二年法幢三樹意覓一具眼人不得何天假其緣相遘於仙眠洲上說及此段光景無不相信但試稘迫不得三日提點耳昨雖快談不過草草而一口氣怎能說得到底居士氣宇雖不減石公龍湖也須久久方能盡善古人有生來淨潔者有學問淘灑者有工夫磨煉者閲來書似在第三方得徹頭倘船子可能留一日再來痛領談笑針錐瞚揚棒喝作赤身擔荷人無自甘門外復元璧金居士向史書上楷模道理恐不能作了當人何也公以孔孟比大鑒而先朱程比臨濟而後胸中何重前而輕後之甚邪既朱程比臨濟而後則臨濟而後盡屬知解雪竇云此箇尚不與教乘合況中庸大學邪若論大鑒而先即玄元蒙莊猶尚不類奚仁義之道一門哉從上來事如大火聚觸之則燒公謂縱禽便利可乎不但不識古人且不識古人用處誠景響中事無怪乎山僧語直也倘把古人用處頓向面前著實理會久當親證始知不是縱禽不是便利亦知山僧不女欺也來書有向道最為堅固切欲實證等語故據實寫來諒必不氣悶下筆沒人情也復白拈張居士來諭生此季世爾我皆苦回望天竺尼山真雲泥殊繼也大約過量人斷出此苦之外又何須論天竺尼山之樂而爾我不樂為哉然山僧正好向一步一跛處示人爾亦好向呼奴喚婢邊作用若身若世總是當人本地風光誰見有一絲豪身世為苦樂邪幾時策俊骨過我聚話一上何如復困菴龔居士如何如何一任卜度若據者箇居士實未得在不見認著依前不是不認著依前亦不是認與不認居士如何承當又謂棒之與笑本自無殊一任卜度但屈殺古人多多也然者箇即韓白蘇黃尚未夢見況居士種種見解乃能得入路邪至於近與不近來與不來山僧放居士二十棒免得葛藤蔓延復淨土寺淨峨禪人萬峰老人祥符解制復有黃龍之命連書相喚欲山僧往黃龍但不知何所教也今又一書敦催乃破暑而去則前所許者實難如命況扯葛藤念子山僧灰冷久矣如的欲完此因緣可請徹兄甚妙徹兄是山僧素所知者二十四部無不洞淵造微如舍徹兄而外山僧莫得而知也復王方伯狄雲居士住方城山日常在師僧前稱說居士見宰官身護持我法者適誦大教至欲聆風幡之說則已在公筆尖上漏泄了也又要山僧矢上加尖得不為葛藤禪所笑邪如公識得便是放心時節不然還須共山中人住幾日不致作門外弼終門裏相公也復長眉羅明府土廣人稀山僧素所慨者長樂菴得公金石之談山僧眼中意中不覺光明此何修而能致此也前牛山亦承公與之酬唱激揚不然何能使新寧道俗沾法利如是之沃也適又承多寶臧中移來利益人天山僧汗顏統此致謝復懋中朱居士荊楚間每晤士大夫言及此事無一二不怖毒害能可其意者故買輕舟溯流而西以尋亮座主舊址對猿鶴招麋鹿誦箕山燕蕨薇為樂不意慈利多有辣手阻我蘭橈而復有居士豈悅老再出無盡後來乎請過青蓮山中重論末後句子勿為紙墨交可也頌古世尊初生僧祇一片苦心腸展手才堪示四方若是獨尊天地事不須扶過祖師堂大慧舉竹篦子匹馬西還無一薦樓前空歎穿楊箭來時祇想論神功爭奈宮中不召見世尊答五通仙人堂堂大世尊那通亦難窮漫穿鑿枉費工良久云春風依舊五湖中善財度草能殺能涽只一莖草者裏不會何處討善財善財莫被謾好不落不昧不昧不落前錯後錯春風起洛城華鳥不見過過也是大蟲看水磨十智同真百二嚴關欲上難不知別路向長安一聲喚得故人出緑酉紅亭奏合歡楊岐示衆老僧舉則公案布施大衆良久云口只堪喫飯九十老婆逞玉顏不知雪已覆雲鬟旁人卻道風流甚別是天地非人閒南泉斬貓手中寶劍起龍文百二河山蕩最氛從此太平消劍戟更無戎馬度河汾黃檗打臨濟三頓棒無專三度上雲房六十頭皮起禍殃寄語諸方當著眼何須清濁費商量裴休丞相問黃檗壁上高僧象畫人不會畫人心何似人心會畫人欲識畫人端的意等閒喚處句來親趙州三佛木佛泥佛與金佛何常不是大人作只是當年老趙州不曾把定末後著婆子燒菴無專突出向雲中一片寒天起黑風好箇金輪無艷色回頭猛火在牆東僧問雲門如何是佛門云乾屎橛雲門屎橛人多氣急屈指算將來九九八十一夾山見船子全身分付不須疑才有絲豪便見欺末後著知不知覆船入水也多時黃龍三關我手佛手拈苕弄帚括地掃天絶無好醜我腳驢腳步步踏著引得兒孫無繩討縛人人生緣種地耕田驀直一路蒼天蒼天玄沙敢保老兄未徹話蜚鳶嶺下敶雲黑捉得玄沙者箇賊切卻尾兮斫卻頭銅睛鐵眼認不得睦州見僧便云見成公案放女三十棒劈頭把出驗來人匝匝清風繞客身既是金蘭莫逆友何須戈戟暗中陳拾得曰無瞋即是戒心淨即出家我性與你合一切法無差無瞋無箇戒無心無箇家我性與你性擬合即成差僧問破山老人終日喫飯不曾咬著一粒米時如何山云一箇斑鳩九隻鳥終日喫飯不曾咬一箇斑鳩九隻鳥飛來飛去樹梢頭鬧轟轟地生煩惱龍城元徹禪師示衆眹兆未分總是者箇兩儀既判不離者箇即今縱有者箇不出者箇分不分看此閒不須一箭過重關堂堂便是長安道趁柳尋華白晝閒龍城又示衆有時一棒向活路上尋死人有時一棒向死路上尋活人有時一棒教伊死也死不徹活也活不來立地恁麼棒頭下下且精明殺活雙章不著情分明一一重拈出不是五千舊葛藤分鐙偈付廣福大儀觀誰長老嵩少東來直指禪令行吳越復西川棲靈更付臨笻竹惡辣聲名自此傳付洛浦慧月寂亮長老蘭江渡口令初開鐵鑄才堪入室來竹篦堂堂三尺鐵馮君拓上雨華臺付金雞大同照啓長老天篤傳來事事昌如何更有別商量藥山一鉢親分付好去烹泉濟十方付棲靈頑石完矩長老山亭一語絶多疑衣鉢今朝可付之歸到漢豐全正令青山不許著便宜付牛山見斯圓照長老十載巴東毒鼓鼙聞聲死去已多時穌來可繼牛山席滿院華飛信益奇付方城獅巖果霑長老指月室中喫棒回方城寺裏吼如雷重重惠女桃支杖一任英靈四海來付廣福可雲果霽長老十分膽氣壯如雷曾在棲靈中毒來此法和囊分付女山頭藥鋪任從開付張懋德居士修之別號沒量拈華微笑到今來六十八番正令開且喜新安張沒量棲靈門下和歌回付熊之奇居士平原別號止白桂楫中流兩岸秋悄然繫艇大江頭綸竿才向蒼龍窟好箇金鱗躍上流付張允中居士則堯別號白拈牛山一棒斷人魂活得來時是上根今日丁寧為聖種堂堂誰是俗兒孫付熊之京居士大原別號玄倩曹溪春色十分闌一片清香誰解看獨許大原先得意東風迢遞入長安付胡齡祺居士是渠別號實參濟北宗風萬古春華香鳥語意偏新蘇黃當日聲名重今日峰頭女更親付張懋學居士二卯別號文禪指月園中碎頂門烏紗猶帶棒頭痕寫來一句知心話不是愁人也斷魂付陳正道居士瑞環別號明珠烏紗叢裏道偏孤昨夜論心理目符磚鏡堂前月更皎許多梅柳盡垂珠付王珍居士思修六年死志出頭來語默相投果俊哉此去燕居茅屋下春風秋月任徘徊付王裕甲居士玉澡別號海艇烽火極天物不寧門庭冷落不堪聽曳回拄杖誰能委付與吾徒萬古馨付熊之哲居士參原一曲衷腸欲話難先宗獨許默中看誰知俗子豁開眼拂袖還鄉理釣竿付陳道婆明妙盛山幾度已曾說法眼圜明性自悅末後還鄉曲更清吾徒豈是空饒舌付陳道婆明理十載殷勤豈偶然江風明月是單傳等閒識得竿頭意秦國何勞說後先付黃道婆明道生平直以道為先渴飲饑餐豈妄傳授女龐婆回向句溪山雲月祖師禪付王道婆玄明蘇迷盧竟鎮海瀾分明說在一豪專山僧不必重安柄法乳從今任爾餐付熊道婆玄印打碎無明窟可全靈昭百草又重詮臥龍意旨從今得任女油餈擲市廛雜偈山中吟我居山無奇特食黃精燒松葉閒不過長自吟三四句寄知音玩月偶成海上古明月遙遙來古松夜深雲散盡眇眇欲相從漢豐道中攜杖歸來晚落暉返照東溪聲亂石裏山色莫煙中示頑石矩禪人頑石本無情點頭情自可乃知生公徒當年未負墮解嘲無道人情好人情返復閒不如支枕臥百事何相關示笑月初監院洞壑深如此公卿少干謁悠然萬事清笑入松邊月睡佛池山頭一箇佛半在水底眠鐙火不相照明月卻高縣一笑亭碧色媚孤山萬竅來怒號大江自前橫笑歸來時道示止白居士趙州道箇無子湖教看狗山僧無法說拂子驀打口示明峰監院身住無塵地心空亦是禪偶來石上坐峰月落飛泉答生死真妄問去來不以相動靜不以身非生亦非死非妄亦非真示若灑禪人一念心清淨光明猶若灑直透威音前何處狂妄起示孫居士從聞幾度入青山草鞋也踏破如何不自知還來論者箇示印石禪人餘霞散成綺澄江清如練天水兩相望化為石一片示明節禪人出郭居松山日日營何事獨有古人禪平常不虛棄山居挂笠夔州幾載了無一事可人惟有峰頭明月往往來來自親自余住此山中白雲半屋常閒日裏松閒鳥語夜則衡門不關山深杳無人跡獨有麋鹿為鄰負杖有時出戶遙見食野之蘋散步行到溪口萬樹鳥語華香忽見飄風驟雨急向古穴嵒廊千里萬里月色三峰四峰秋光樂則高歌一曲倦則斜枕石床攜笻剛到嵒谷又聞石磬鏗鏘緣徑徐徐歸去沙鐺已孰芥薑山中雖無奇處林泉也勝長安饑來幾碗薄鬻困則一箇蒲團疇昔山翁行腳草鞋踏破幾堆今日高眠絶頂任他佛來祖來居山沒甚生涯直條拄杖袈裟閒到嵒頭趺坐笑落幾點梅華山色溪光堆裏只好掃地焚香如論祖佛公案任他浩浩商量題宿雲亭白雲與亭似有約亭與白雲亦相若灑灑淡淡宿亭中歲歲年年如旅泊贈美若蔣居士杰八十二翁書草聖江湖久矣識名姓昨從嶽寺遠相尋一幅送余真遒徑送竺微和尚還越隴西尚未盡風塵此日帆開送別津遙憶鴛湖如鏡淨不知秋月照何人送知微禪人白月高天去不疑吳山楚水欲何之草鞋腳底如能解回首巴山意莫遲示淨遠禪人攃手逍遙一著子本無生也本無死當陽一棒是根源申腳原從縮腳起偶成得休休處且休休今日方知遠遁流瓢笠好隨風月老任他佛祖不為儔示月林禪人茅屋雲中春色煥千溪竹樹香風滿有時支銚鬻清流一氣傾乾茶七碗過寶峰訪龍城和尚野徑行來日已斜雲中犬吠是山家閣上經聲松外落林專也放白蓮華弔煙霞道士一到人閒八十秋心同雲月自悠悠夜來應有還鄉信御鶴翩翩到十洲贈龍城本明徹和尚十載離情欲灑難蜀山楚水幾相看歸來獨有龍城月高映蘆華十七灘示法曇禪人破雨乘風赤腳來相逢一味喝如雷如何當作衣中寶依舊從前熱鐵摧破雪和尚訃至一到渝州未十秋煙華浪裏坐扁舟錦鱗尚未吞香餌何事絲綸即便收含璞和尚訃至梁山笑聚萬峰頭一別東西十度秋此日芙蓉聞罷席叢林寂寂與誰儔鐵龍山十首一袋還山過嶺東橫擔雲月杖頭中諸方老宿宜公舉漫謂歸貪枸杞紅香茅誅得鐵龍東消受青山緑水中自是清閒無外事朝朝鉏藥旁崆峒深山別是一生涯芋栗多收樂歲華更有一般清趣好西林日日起煙霞山中別是一清機水當茶來雲作衣世外高人如有意何妨相繼到嵒扉幾箇師僧住石泉朝來飲食夜來眠衣中一寶雖無異大氐壺中別有天少林直指沒多岐不用勞勞別覓之秋月春華頻寄意如何此外問真知破破茅菴舊舊床十年坐臥此山岡饑來自有松華飯世外何勞辟穀方十年溪上牧牛兒一片衷腸說向誰獨有寒猿啼夜月天明踏破老松支冰霜歲莫苦東林紙被蒙頭冷不禁惟是菴前雙柏樹孤根無改老幽岑從今一日不離山萬事無為心自閒竹杖倚松雲鶴靜清風回首在嚴關示中樹熊居士欲啼還笑都無意別有商量落位次翻復追尋聲臭前何常不是如來地示印文無文印子向空印印住虛空空不消急急歸來子細看牛山聳出白雲霄示可雲書記未透雲門一字關茅菴且住白雲山有時翻出平生手一劍橫抽掃百蠻送允一壽侍者十年隨侍鳳凰山送女西歸白水灣若到新安休住著還須再上臥龍關示見宗未破疑關見道難疑關一破即長安回頭卻有青山分笑月吟風臥石盤示長木棟侍者此日重來履碧霞頭皮一擊血淋沙堂堂好箇還家路爭奈家鄉隔海涯示慧波玨侍者女父宗儒女學佛宗儒學佛事如何猛然躍過龍門去電走雲飛倒玉河與別眼熊居士摶風帶雨上山來短短柴門為爾開格物頻頻言底事子韶一笑響嵒隈示熊爾錫孝廉勞君幾度到雲門兜率何堪可共言若論心原無說處茶杯舉起便消魂復白拈張居士臥龍無字到諸方多謝少陵論短長縱使文華雕刻好勞勞未免費商量示甘使君六守居士一繫扁舟到臥龍心原細細論初終回頭明月瞿塘上冷冷清輝曜碧空示翼如禪人泉向高嵒下碧天帛拖一匹挂雲邊煙波一似惡池出白浪滔滔涌淡漣示雲海禪人舟泊臨江鹿渡津登山欲訪白雲人風幡意旨如何道三頓竹篦漫作瞋示徐成宇居士十載滄浪理釣竿蘆灣一曲和應難不如且擲煙波裏回首月高玉一團示璧侍者等三十餘人令行四國已多年未得英靈可息肩報女吾將離四大春風吹殺五湖船澡浴剃頭都不許粗麻細苧不須陳堂堂薦取臨行句即是分身奉剎塵生滅無將來論我此言終是著關鎖欲知正見復何如明月峰頭看猛火楚水巴山十四秋說黃道黑豈無由祇緣道大人難識且暫高眠白月樓不是臨行寫熱腸亦非無可繼衣鉢棲靈多恐久虛涼珍重當須識本末法脈圓完覺復祖道常弘鐙傳永世紹續正宗板存嘉興楞嚴寺經坊夔州府臥龍寺字水圓䂐禪師行狀師諱圓䂐字字水鐵龍其別號也漢太師譙周之後家安漢嶽池羊山下父聖功母楊氏生明萬曆乙巳十月七日有異兆人多奇之五歲入孰能誦四書頗敦敏十歲知春秋能文常喜與僧談一日父諧往山寺有僧看經因問看者何書曰心經曰借覽可乎曰可師遂覽既歎曰此聖之至也自是以後有出塵之意而不敢𣊡告於親友年十三將為納聘乃惟曰塵網恢恢不裂之於此日而後欲解亦難也因見有衲憩樹下而貌高古不類庸僧乃問師欲何之衲不對負囊而去師雖不聆衲語而心切慕之一夜不樂黎明即逸去氐渝追衲不及急出峽造江陵遍謁名勝忽見衲於千佛菴急前揖曰師識弟子不樹閒一別兩月逾矣衲驚且詰曰少年欲何事而遠涉邪曰乞師剃度納憫而收之衲諱德崇字大悟是師從舅氏也既脫白勤習經律而同列沙彌雖前十臘不如師一歲學也年十五聞江浙講席半為蜀人欲往參學白本師本師聽而遣之由衡廬達建業過武林不入越歲經旨遠造一時諸師莫不嘉歎忽動省親之想買歸櫂到江陵謁本師而後還蜀則親已逝矣明年往嘉州禮峨嵋復欲下楚道梁山會明法師與之論法華有契留住分座說法明法師臘尊學博學者罕有契而一見即許之足見師之所造也年二十五開縣有知微雲波者同瑞環陳公星拱黃公訝師大覺講楞嚴自此則新寧之牛山達州之黃龍皆師法席矣崇禎壬申棲靈寺成衆以為非師莫主公書迎師師既居之常閲五鐙見德山圓寤皆是法師遂欲罷席叩宗旨於吳越忽聞破山老人自嘉禾還蜀在梁山太平又見提唱語頗信服時有僧坐僧堂前師過都不視之師疑而邀入問焉僧曰某自浙來以天童衣鉢在蜀固欲見破和尚耳師疾與之諧往既至見方丈長揖不拜明日平上堂舉德山見龍潭語示之師芒然不知是義所在平召入室夜坐不覺論之久侍僧曰只一法師而費此商量何也平曰是玉不可不琢越十日襄香上方丈問佛說上中下修未審修箇甚麼平曰修即不無女且明道眼著又問如何是成佛根本平曰父母未生前薦取師曰某到此不會平曰向此著力好時四方多故而楚兵又將入蜀因辭隱開縣之九龍山居一載疑情愈重再往見平請益工夫平曰工夫不到不方圓著實理會去及平遷中慶師又往見之求入堂平不許師曰此回如不得入路誓不出平然之一日聞維那月竹舟師說前有僧入堂三日有省師被此語激發頓不知工夫之切密而癡絶者三七日因竺微泰師一喝而師之桶底脫也走上方丈見平平上下顧曰者是甚麼所在師曰者箇所在不可說平曰你者說底聻師一喝便出平隨落堂師問盡大地是一眼時如何平便打師喝平曰再試喝看師云知音不在頻頻舉平曰伎死只如此師曰再有絶伎作麼生平曰重言不當吃師曰伎倆盡時諸念盡猶來何處不稱尊平曰去年有供養沒人還飯錢今年有人還飯錢又沒人供養師拍一拍平便歸方丈西堂珽師曰大慧十八寤公得頭一寤師作偈見意曰迷則千差寤則不別十聖三賢繫驢之橛一日平上堂師出拍兩拍便𢍏卻席平便下座師呈偈曰當場一語絶家私此意須還父子知自是旁人空著眼徒勞歎息鐵師兒平曰卻似有箇入路師曰也不可道別有平便打因看有句無句如藤倚樹又似墨黑乃歎曰大慧何人尚疑到喫飯不知舉箸因又起疑後在書記寮偶與人語忽然冰釋上方丈見平適平在火盧上便拈火柴頭打出師之有所得心伏不住而歡喜踊躍作歌詞偈句不知竟幾千也一日過河口忽念木人夜半穿靴之語而一旦平妥如雲出岫似鳥飛空絶無管待閲五家宗旨如子猷青實我家故物也平常書法語付師其略曰字水䂐公得得破家散宅來入者保社捉余腳手大放憨睡饑餐渴飲盡是本地風光啄唾掉臂全章殺活機柄云云乃以師為西堂平應棲靈請師亦在焉及平住祥符師遣人上書論有鼻孔無鼻孔往還三次又常擊碎茶杯驗事堅固則師之所造非淺故沒量居士啓云三書扭折鼻孔曾當場法戰古錐一掌擊碎茶杯輒尋常勘驗衲子盍本諸此也其後師與破雪諸公祝平四十平屬師與雪公共廣化門雪回渝之西湖師還夔之臥龍將尋亮座主之山而為隱遁之計年三十三矣新寧士大夫高師德風以師名白郡請出世於城西之指月師幡然行曰吾不為而誰為於是歸者如市即士大夫願假擇木堂講明此道者亦百人焉由是漢豐之棲靈江陵之天皇慈利之華嚴澧州之藥山新寧之廣福不十年則六坐道場矣師說法有古德之風故其上堂如蝴蝶生枯樁千古之常事指物與傳心早落第二義又如遊龍峰頂猿鳥啼不二之圓音指月竿頭青冥𣊡無聞之般若又如認著是痛與一頓不認著是亦痛與一頓昨見孤鴻塞北歸足邊繫得安南信又如秋色入慈昜天門山色換樓頭梧葉飄有眼如不見又如一浦雲煙萬井冰雪玉樓人睡不知天曉瓊樹鳥啼不知晴明又如鵝城峰碧牛山岫青不是古佛螺髻亦非諸聖頂門昨夜文殊普賢疑到五更及至醒將起來依舊可憐生之類他如開堂日沒量張公居士請書雲堂額師曰攃佛處以衣袖左右撝曰山川也是草木也是及四禪四眼問答之類種種施設若非深造遠蹈安能如此直截痛快乎即廁之雪竇真淨松源天目雪巖高峰之閒則亦伯仲焉爾師重道好德不噬利不榮名暑寒一衲飲食一鉢即錢穀如山錦繡如市都不經眼故凡師之及門莫不以清白為行所以師在棲靈日有僧名全心者來遺金三十頑石矩公拾得當白衆無認識者全五日後方覺來白師師曰在某處矩出金原封未解又笑月初公往淨土寺拾金五十歸白師曰此必商賈所遺也初當候而還之兩日後其人來倉皇之極口數曰有死而已初詰之其人曰兩日前遺下白金是貸以糴米者某家寒將何以償言畢大慟初曰無啼金在我處遂出而還之其人曰生我之恩逾於父母跽謝而去如非師之好義何能感及門清淨若此則是師之皇皇德業而揆筆舌何能殫述焉吾蜀父老亦能道之常曰為佛祖兒孫如吾臥龍老人可謂不忝也毅廟甲申閒殺僇之痛焚燒之憯無寸土乾淨師諧五七人避之方城避之九龍避之萬峰未七月日而二郡三十縣人與物無有矣師以昔年參方勇不避暑溼惟以佛法因緣在意不覺成患而損一足此時履動非馬即輿故不能遠去萬里外逃此大劫乃於新寧之廣福為戎壘所有幸師德聲素來遠播雖持兵者亦知有師競來禮拜奉以淨食并乞師懺罪師盡陳以罪福忠孝之事皆曰吾屬本國家赤子安能萌此不軌之心乎此李某張某陷吾屬於此奈何師益就此指之導之故殺僇少貸吾同袍之釋子亦賴此得免十一其來集之及門亦如臥龍時無減此十二月十八日也明年移營梁山師目此竟非沙門所安二月二十七告衆曰吾自為僧以來不受不義之衣食況戈戟中吾豈樂乎自今日始勿進飲食來月朔吾當出營矣營之愚者聞師言恐失師皆防之至朔之子喚侍者張鐙謂曰女為道其努力之吾以此時別女矣侍者求偈師書數偈與之又曰徐護法為師之重獨不留一面乎且坐脫亦化人之一助因勸請至午徐率衆至求說法師欣然上堂說法畢端坐而逝實乙卯三月朔日也留五日始茶毗其營中慕師者皆持緞帛及沈水等香競投薪中以表敬及收骨得五色設利若干人皆爭拾之骨臧梁山金城之西胡氏萬松菴後自此遐邇皆曰有佛矣師世壽四十有一臘二十有八室中親印弟子大儀誰公等七人居士沒量等十人婆子明妙等五人其受化獲益者千萬有餘師語録初誰公裒刻於棲靈者八卷次亮公裒刻於藥山者又八卷次矩公收全録裒刻於臥龍者總二十卷今刻於黔南者璧侍者囊中所存數篇非師全璧焉烏乎師為一大時宗匠道沖德備嘉言懿行揆焉能詳述𣊡揚於天下使同事之人知師之所造乎揆懼湮沒乃不過狀其人所共見俟大手筆為師作塔銘者有所考住夔州開縣寶峰法姪明揆謹狀
