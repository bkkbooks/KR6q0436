body:
  text: 夔州臥龍字水禪師語錄敘指月園錄成社中諸子索余敘適余病胃不耐執穎倦睡去夢入指月園問侍寮索紙接手即呈空紙一幅於師師曰也須道一句子來余即畫一圜相師曰只是不道余曰向癡人不得說夢打屁後教誰濾渣龜負出來喪性命於赤字鴻已飛矣覓指又於黃蘆夜來八萬四千偈只須四兩大黃下出架上一千七百則快索一把火苣飄揚諸子聞於無聞吾師說而無說即使言前薦得有甚了期乃以手摸師額曰描看你面皮厚多少師遂驀頭一棒曰賊卻女深心奉塵剎遂驚寤索紙疾書出來向癡人前說夢崇禎己卯二月十五日夔州府新寧縣嗣法弟子張懋德撰又一色未立萬籟闃然當是時也木樨無隱砌蛩俱默桃華不語雞犬自恬大千豈有壞時諸佛何常出世無奈勞勞多事哆哆相承教野老以還淳洗素絲而求白宜雲門之有憾誠曹山之不如寧知空外劫前早沒交涉待爾破顏寒齒堪作麼生四十九年不自嘔卻千七百則俟誰刪之青冥云冤白日走魅況又有搏饑虎而求食伍白澤以為妖發烈火於滄海興穨瀾於赤波上之則奴隸祖禰下之則奔走人天徹底掀翻憑空顛撲如我臥龍老賊恨不及生初一棒打殺令奄有今日舉口禍生休道以酉解醒孰任鼓風揚焰獨哂如許狂肆莫謂無人識他若不趁斯翻除將必有時罵我夔州府新寧縣嗣法弟子熊之奇撰啟伏以吾無隱爾飄來雲外古香法亦非心點破柏庭新翠霜輪月轉智無功處全章掜目華生指所標時即墮況至借人牙後之穎乃轉增我道眼之塵自非吾師孰續慧命恭遇臥龍老和尚撲破萬古虛空推倒十世諸佛三書扭折鼻孔曾當場法戰古錐一掌擊碎茶桮輒尋常勘驗衲子知馬駒蹋殺天下乃龍象近出蜀中懋德等志合孔釋之仝力清朱陸之壘笑聞樨之從人借陋見桃之自竟來在懋德等必不刺腦入膠盆若吾師無向虛空掘屎窖幸來仝撾塗毒鼓相將共坐多窯床謹啟夔州臥龍字水禪師語錄目錄序二啟第一卷上堂住夔州新寧縣指月禪寺語錄住夔州開縣棲靈禪寺語錄住荊州天皇護國禪寺語錄住岳州慈利縣華嚴禪寺語錄住澧州藥山禪寺語錄住夔州新寧廣福禪寺語錄第二卷小參晚參示眾機緣法語規約佛吏第三卷書問頌古分鐙偈雜偈附行狀夔州臥龍字水禪師語錄目錄終
