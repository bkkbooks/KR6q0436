body:
  text: 住夔州廣福門人觀誰録住夔州新寧縣指月禪院語録崇禎戊寅十月朔到院山門云若論步步風規則十方無壁落若論重重關鎖則四面亦無門以杖指云者裏合作麼生大衆者裏也好箇入路據室師拈拄杖云鐵人據鐵室坐鐵座拈鐵棒且道作麼生施設乃卓一卓云生鐵鑄就底到來也須頭破腦裂有僧便喝師打七棒趁下劉兵憲陳太守李明府及紳士護法請開堂上堂拈香祝聖畢次拈香云九上萬峰石中有玉三登中慶沙裏無油若非撲碎窠巢終是鼓鬻飯氣供養見住梁山太平禪寺破山明禪師大和尚維那白椎竟乃云菩提涅槃真如佛性及從上來事總被者上座一椎喪盡了也還有箇甚麼而言觀乎拈拂子畫云犀因玩月紋生角象被雷驚華入牙擲拂子下座上堂豎拂子云會麼天竺玄猷少林家法盡向者裏露布只是你諸人不肯領取所以總成敗闕雖然門前縱是知音少卻有秋風送月來陳微一秀才送子出家上堂父子儒釋揮麈持錫兩重公案同此消息真亦非真俗亦非俗當年裴公送虎溪今日陳子向指月上堂除卻心性是箇甚麼欲覓蹤由錯錯錯錯具眼衲僧如何摸索便下座上堂遊龍峰頂猿鳥啼不二之圜音指月竿頭青冥顯無聞之般若若能一一領得則從上來事彈指圜成其或不然徒自疲困上堂一呼便應六室虛明一舉便知六處解脫若當向上宗乘全非第一義諦既然甚處與女相見乃擊案一下上堂蝴蝶生枯樁千古之常事指物與傳心早落第二義良久云不是不是上堂止止不須説我法妙難思諸增上慢者聞必不敬信良久擲拂子云誣人之罪不堪持論上堂釋迦老人在你面門唱言惟此一事實餘二則非真你諸人還見麼便下座上堂僧問西來大意且置未出方丈時如何師便打僧喝師復打乃云一法不存青山緑水野草間華頭頭不至一念才舉塞北安南人倫物理歷歷在前諸人向者裏如何究竟若究竟得我與女同枕共被若究竟不得你向瀟湘我向秦胡憲卿護法祈嗣請上堂師以拂子畫一畫云無上妙道盡在於此天地萬物盡在於此如是則憲卿居士不向佛求不向法求不向僧求求男得男便生福德智慧之男求女得女便生端正有相之女男女互生生生不已亦盡在於此復顧視左右云記取記取張則堯居士誕請上堂師拈拄杖云諸法不自生亦不從他生不共不無因是故説無生寤得來底一塵不立未曾寤底萬慮雲興良久靠拄杖喝一喝云水凍冰生上堂僧擬問師便打乃云指月家風眼高一世逢魔不怖見佛不禮禪不知參教不解習夜不挑鐙日不掃地哀不啼哭樂不嬉戲人若問著不吐一句唯條拄杖攔腮劈脊遂擲下杖笑云且道是甚時節冬至上堂一縷麻線遮縷風霜雪何妨滿道中不燒榾柮地盧空乃呵呵大笑下座上堂小盡二十九大盡三十日十九八七六五四三二一於此會得參學事畢上堂舉拂子云會麼此是指月于萬峰山中無會易地上三鍬九鋤掘得來底鈍置多時今日不忍被盍囊臧對衆拈出時維那便喝師云不勞注腳新法堂成上堂斬新日月特地乾坤剎竿豎出雲霄門頭橫厭海宇所以感得龐居士説偈贊歎云十方同聚會箇箇學無為此是選佛場心空及第歸雖然畢竟如何是心空及第歸底道理以杖畫一畫臘八上堂臘月八日正晴放出明星刺眼睛瞿曇老作麼生今古何曾有二人擲杖云不煩久立上堂從上來事總無多塗若能直下承當便是宗乘直截一路既無靈利只得引玄畣妙落草商量及乎究到頭來全無用處大衆佛不出世祖不西來還有是般事麼所以道指南一路智者知疏如今大衆盡是多歷江湖久居林下胡不體究要待何時生死事大無常迅速珍重薦嚴上堂朝聞道夕死可矣畢竟以何為道夕死可矣莫是明德親民是道麼莫是正心誠意是道麼莫是修身齊家是道麼莫是治國安民是道麼莫是不睹不聞是道麼莫是無聲無臭是道麼莫是綱常仁義是道麼莫是升階正笏是道麼大衆向者裏試辨看若辨得分明不枉繹初衛居士為尚書清敏公薦拔之誠其或不爾更聽指南便下座上堂三世諸佛不知有鬼怕神符貍奴白羖卻知有狗咬枯骨若明得此兩語南泉落在下風若明不得此兩語大有事在上堂雪色滿園中寒風吹古瓦故人不見歸小鳥空啼野擊香几下座上堂指月門下不是一切人棲泊處若向者裏棲泊焦頭爛額不向者裏棲泊亦焦頭爛額良久云者裏切忌説破上堂七十二棒翻成一百五總不是分外事但恐一切人向他門頭戶底無出身之路所以今日不惜眉毛露箇説話舉杖云不可喚作渠上堂佛法因緣不是小事亦不是博知經史及一切子書語言文字上求覓得底只須向佛祖未出世父母未生時明得始稱參玄上士不然盡屬狂解惱亂其性何故聻中峰雲亂起澗底水潺潺上堂小知不及大知小年不及大年乃召衆云冢莊今日向指月門下賣弄伎倆被露柱鐙籠曲折一上只得有眼看不見有耳聽不聞卻來指月門下覓箇説話指月也只得道箇巧伎盡時諸念盡白雲散後見青山上堂識得一萬事畢遂畫一畫召衆云者是一你作麼生識若識得設保萬事畢若識不得切莫向諸方道親見指月來上堂一室虛明不是時人遊戲處一亙晴空不是時人遊戲處千峰秀色不是時人遊戲處萬華爭艷不是時人遊戲處何也巴東湖南與麼去上堂認著是痛與一頓不認著是亦痛與一頓昨見孤鴻塞北歸足邊繫得安南信以杖築禪床下座上堂開眼便見開口便道雖是省力若較從上來事十萬八千在何故不見道分明月在梅華上看到梅華早已遲上堂大衆不可造次若造次三世諸佛歷代祖師與你坐與你臥若不造次貍奴白羖水鳥樹林與你坐與你臥上堂宗乘未唱淨白地上有許多人坐臥自在自由及乎我祖西來弄出者場禍事如今要坐也不得要臥也不得要自在也不得要自由也不得雖然總是玄沙道底解制上堂解開布袋如意自在任去任留了然三昧紅華峰上正春晴鵝城山下雲靄靄住開縣棲靈禪院語録據室若論者箇所在也好歌於斯哭於斯聚國族於斯為甚卻道佛來祖來請居門外者裏合下得箇甚麼語拋下杖云不圖打草且要驚蛇結制上堂僧問諸佛諸祖道不得底和尚作麼生道師打云一棒碎微塵進云恁麼百卉逢春萬華爭艷去也師云豁開柳眼笑殺梅梢乃云風行草偃水到渠成本自天然何假雕琢才擬議時即錯了也以杖畫云將謂桃華深有意誰知開後也徒然上堂僧問如何是天地同根萬物一體師云釋迦曾稽首進云和尚恁麼道學人如何委悉師云甚麼人教你如此乃云若論天地同根萬物一體則人人本具物物全章無有大小方圖亦非玄黃朱紫到者裏有無不得是非不得取舍不得聖凡不得玄妙不得道理不得言語不得寂默不得乃至真如佛性菩提涅槃賓主照用玄要偏正圜相顧鑑一字關六相義輥毬舞笏打鼓揮劍擎叉扣齒千般伎倆不得顧左右云既總不得且道作麼生才得有定當得底出來道看一僧才出師搖手云此是諸佛祕臧無人能到在所遊方勿妄宣傳便下座上堂萬峰青萬峰青春色一一物自明百囀流鶯處處鳴處處鳴祇是時人不解聽依舊可憐生上堂臨江浪靜石龍船載明月之珠鹿渡煙消漁父子釣蘆華之岸一一是諸人出身處切不可作竟話商量若作竟話商量西來大意掃地盡也上堂盛山高映繡衣池野鳥啼幽華落時多少尋香逐嗅者將心往往向深支上堂百千三昧無量妙義祇向一毛頭建立敢問諸人還識一毛頭麼子規啼緑樹牧豎歌青山上堂紅塵堆裏盡是談般若之處若著意追求便被紅塵盍覆終無解脫之時何也總是鹿子踏月上堂臨濟喫黃檗棒把髻投衙百丈被馬祖喝以酉解醒棲靈也無棒打人也無喝喝人但只間看家家緑樹鳴黃鳥處處青山覆白雲上堂向上一路理涉幽玄旨外一宗機貴神寤所以先宗道才著脣吻便落是非大衆不可容易莫終日只浩浩商量那箇書史可讀那箇經論可講教壞人家男女且一切百家異説盡不是了道之事若作了道之事達磨一宗盡屬知解上堂玉貴溫潤道貴眼明不然終非至寶故祖師西來掃除知解不立文字謂之教外別傳今人不察大失宗旨不是於經論書史邊記取便向孔孟老莊上孰讀烏乎殆不可教也大衆幸是無事趁此時節做上一場莫走向他家甕裏淹殺可惜許上堂演若迷頭頭本不失鹿子踏月月非真形學道人向鏡中覓景上求縱百千劫有甚了期大衆棲靈門下不是厭良為賤亦非抬捺商量祇要識得根宗便休喝一喝上堂問一為無量且置無量為一時如何師云拂子千條線香煙一片雲進云最初一句拈向一邊末後句子請為舉揚師云卻説他不出進云學道也不是參禪也不是和尚如何為人師云腳跟下薦取問遠遠趨風和尚如何管待師云放女一頓進云若人識得心大地無寸土指地云者箇聻師云莫被刺眼好進云選佛場中及第歸不入此者作麼生勘驗師打云速退速退乃云道原無狀法亦強名鳥啼華笑月色溪聲鳳凰山下鹿渡溪濱既是恁麼不快何必落草求人上堂昨日四今日五漁歌自放臨江渚不是知音和不齊祇緣來者盡下里品字峰前棲靈寺裏良久云一二三四五太平專使送法衣至上堂舉起衣云大衆喚作甚麼喚作僧伽黎雞足山中薶沒也不喚作僧伽黎大衆有眼在畢竟喚作甚麼以衣展開云品字峰前裁錦淨盛山頂上繡雲飛上堂僧問石頭瓦塊轉法輪時如何師喝云是甚麼進云擊碎虛空佛祖向甚處著師云屎桶裏進云空外劫前又作麼生師云者漆桶乃云竺土大仙心東西密相付謹白參玄人光會莫虛度如今有不虛度底麼曾憶當年騎竹馬今朝便作白頭翁上堂至道無難惟嫌柬擇才擬開口便落是非正恁麼時如何是不柬擇者有僧便喝師云不是弄潮人休入洪波裏上堂舉秀和尚者一箇那一箇更一箇若是明眼人何須重説破杲和尚云致令默照之徒鬼堀長年打坐棲靈不然良久云忘卻了也便下座上堂生從何來看腳下死從何去高著眼不涉兩塗一句又作麼生朔風凜凜梅華燦燦上堂長期短限畫地為牢究妙求玄開眼作夢所以道有佛處不可住無佛處急走過大衆正恁麼時棲靈門下作麼生行履時維那便喝師云者箇伎倆休拈出不如隨分過殘春上堂欲為師法須有觀光不可沽名飾貌窺竊祖位恐知者竊笑古之人欲立叢林住持必須推選有道有誠信者庶不致有破敗事近聞一種不獨鮮道及誠信抑且無僧規但藉勢以欺枉醜態百出烏乎叢林之德風釋子之節義將何以啓迪乎女等後來有箇因緣切不可效如是事上堂欲究向上宗乘不可將心待寤所以道莫只忘形與死心大衆棲靈長老不是虛語祇要一切人知箇下落不然髮白齒黃無了處回頭依舊黑漫漫解制上堂舉杖云生平惟與此相知石榻談心到極微轉眼才經三四載固陵回首又辭歸祖師心印狀似鐵牛之機去即印住住即印破如是則行住坐臥剎剎塵塵總不離此據此而論非去非住難擬難思其住也春潮帶雨其去也野渡無人雖然又何妨鼓脣弄舌説去説住攜笻頂笠打雨打風所謂行亦禪坐亦禪語默動靜體安然也大衆正恁麼時一句作麼生清江浪裏春風急楚水波頭秋月明住荊州府天皇護國禪院語録據室據此室坐此座行此令有時語驅耕夫之牛有時默奪飢人之食大衆忽有箇二俱不涉底如何管待以杖畫圜相喝一喝云任是傾湫倒嶽來棒頭喝下總按過開盧上堂拈香祝聖畢次拈香云萬峰頂上得來嗅著則腦裂天皇寺裏拈出覷著則眼盲供養破山大和尚舉杖云臥龍道者譙氏一丁生年十三確志出塵十五遊方楚水吳門衡嶽廬阜江浙叢林沈溺教海一十一春真妄差別小大區分末歸高梁太平門庭三登九上微契其心中間委曲舉似諸兄初上萬峰火裏尋冰次上萬峰擔雪填井及登中慶少分相應因辭歸來路舉古人木人之句一旦澄清雖然還有一事急著眼睛以杖畫落落景團團千古萬古與人看上堂僧問如何是道師云雲生戶外荊門上鶯囀林間古樹頭乃云洞庭湖上紫煙映日色之初天皇寺中鐘聲雜桂楫之響諸般無礙萬象何拘若能一一見得分明聞得分明便是頓超之理其或不能莫笑好音空啼野別有恩光一段奇上堂佛祖竟界參未透時如銀山鐵壁擬欲進前撞斷眉目擬欲退後蹉過腳跟大衆祇如進不得退不得畢竟如何出身如出身得生生慶快處處無依天下橫行大方獨步苟或未然二六時中抖擻精神急尋出路始得上堂僧問如何是天皇竟師云昨夜東風吹過去今朝杲日送將來進云如何是竟中人師云密密無蹤迹相逢喜帶顏進云人竟已蒙指示無竟無人時如何師云放女三十棒進云恁麼則從今會得祖師禪也師云莫錯認好乃云一光東照智竟全章彌勒文殊為衆激揚如何委悉若委悉得人人常光見前箇箇腳跟點地張七趙八直指人心瓦塊磚頭見性成佛鐙籠來露柱裏轉身佛殿騎山門上出氣其或未委天皇自道去也無風荷葉動畢竟有魚行上堂從上來事本自見前舉拂子云見麼擊香几云聞麼天皇不惜眉毛將百億須彌盧放在女眼睛裏百億香海水灌入女耳孔裏猶自嫌少乃高聲喚大衆衆舉首師云討甚麼碗上堂舉僧問同和尚一大臧教還有奇特事也無同云有云如何是奇特事同云演出一大臧教新和尚云演入一大臧教杲和尚云演出演入即不無若論奇特事二大老三生六十劫未夢見在則和尚云叢林商量皆謂大慧不肯二老若恁麼商量三生六十劫未夢見大慧在師云投子因風放火不是好心雲巖路見不平亦非本分大慧矢上著尖翻成特地天如不忍袖手俯力為人天皇如是處斷且道還有曲直也無上堂僧問如今説箇甚麼即得師云者漆桶猶問話在乃云雨雪風吹上翠微大功一色露全機卻笑夜來人不識層層包裹豈知非如今還有知非者麼有則出來道看無則天皇鼓兩片皮去也衆皆側耳師便下座上堂有二僧出衆齊喝師一時趁散復召衆云天皇門下須是別有始得若只今日也喝明日也喝總是鬻飯氣有甚宗眼雖然二僧豈無見處上堂也好箇時節你道是甚時節大衆年頭便見雪飄飄草木層層裏碎瑤凍得荊山寒透骨思量懶把舌頭饒燒獸炭酌香醪一園玉竹臨空曲數樹梅華映遠郊上堂古佛未生前一畫九相圜中有一相是何曾落正偏拈拂子作九圜相云還見麼蒼天蒼天上堂昨日也口吧吧前日也口吧吧乃至過去無始也口吧吧明日也口吧吧後日也口吧吧乃至未來無終也口吧吧如今四衆已集寶座已升也是要口吧吧你道畢竟為箇甚麼如不會待下座看上堂天門山青九溪水碧唐虞之先遺我今日不知幾千億猶問何消息上堂昨日雨今日風昨日今朝事不同事不同張公喫酉醉王公歸來叫殺三更月大衆為我道末後句看上堂驀豎拂子云見麼拂子是佛法寶臧能含虛空能含塵剎能轉法輪能成佛道你道如何相見若以色相見不得見拂子若以聲相見亦不得見拂子畢竟作麼生得見拂子擲下云覷著則眼瞎上堂是法住法位世間相常住豎拂子云者箇是相還常住麼饒你説根身器界皆如來臧大地山河盡露法身也祇是箇性常住作麼生得相常住去解制上堂前年結今年解兩箇泥牛鬥入海踏碎龍王夜明珠水晶宮殿雲煙靄還有能知時節底麼此處無人謝兩序上堂兩序大衆光伴法化無可祇謝惟有一文大光錢聊為兩序壽乃畫圜相云伏惟伏惟住慈利縣華嚴禪院語録據室設平地牢關檻佛檻祖布縵天網子羅虎羅龍顧左右云不入者保社底出來有僧出衆以手掩師口師退身打一棒云是甚麼僧喝師云不是不是又打一棒結制上堂盡乾坤界是箇盧子諸人卒難回避若也回避得一毛專上驅雷走電澍雨興雲一微塵裏大抹高揮神出鬼沒總不是分外設或未能長連床上有鬻有飯莫錯認好復舉蜆子禪師隱東山古廟一日華嚴靜和尚問如何是西來大意子云神前酉臺盤師云兩人酬唱固是聲揚千古要塞新華嚴口未在何故蜆子祇知門前撈漉不知家裏臧頭華嚴祇知騎虎頭不知收虎尾若是新華嚴便與禽住云速道待伊開口即與一頓管教者漢一場敗露新華嚴恁麼你道古人還落節也無上堂今朝六月一熱得遍身白汗滴萬樹熏風不得涼陽烏銜火橫空逼前堂伐鼓聲逢逢古澗流泉劈箭急祖師意旨已了然兩堂上座識不識若識掉臂便去若不識待拄杖別通氣息便擲下上堂如如原不動動即成妄想一物不能為為者亦伎倆不慕諸聖師不落己靈網大衆是甚麼所在許女妄承當然律師請上堂自安上座春秋七十餘矣僧臘亦四十餘矣昔參方時曾兩到金陵得戒於古心大師歸來行律亦有年矣忽遇華嚴深信此道堅迎於本院日究道妙於是生老病死八苦交煎始到安妥田地可謂赤灑灑絶承當淨贏贏無回互還有箇甚麼戒體持犯不持犯之元字腳挂於胸次中也雖然正恁麼時如何是自安上座出身一路安一喝師便下座上堂僧問夏日炎炎熏風徐徐如何是清涼竟界師云熱出冷汗來問劫火洞然大千俱壞未審者箇壞不壞師便打問心空及第歸如何是心空竟界師云女未到者竟界在進云未審到得底是甚麼人師云吾若説此人無女安立分乃舉龐居士云十方同聚會師云不遠千里而來箇箇學無為師云亦將有以利吾國乎此是選佛場師云何必曰利心空及第歸師云亦有仁義而已矣大衆華嚴如是注解且道還杜得龐公口也無設或未然還有一人為女通箇消息乃卓杖一下上堂記持名言何生了道柬擇聲色何處求真饒女講得恆沙法門背得無量文句也只是箇聰明學解不如向聲色裏覓箇出身之路好所以道聲是佛聲色是佛色大衆華嚴傾出了也還有見得底麼秋風柳上來池底波紋起上堂僧問如何是華嚴家風師云一步未曾移十方在腳底進云築著一微塵無邊瞋火發師云不是知心人徒勞亂度量僧禮拜師便打乃云華嚴竟界不是小事大事比量亦非頓説漸説可擬女等後生欲究此宗大須立志若不立志徒自殷勤不見先宗道祇劫果滿始得解脫乃彈指云祇劫果滿也且道還有解脫底麼上堂僧問從上來事某甲還有分也無師便打進云早知和尚有此機要師云自謂久飢虛不能嘗一粒乃云若論演説宗乘何處不是所以諸佛説衆生説山河大地一齊説無有間斷既是恁麼又要華嚴説箇甚麼起身云不可節外生支上堂僧問和尚未見太平時如何師云滴滴不斷進云見後如何師云光光不漏進云從此家風超世外更無一事落玄微師打云秋聲處處響木葉村村黃乃云釋迦掩室固執難袪達磨壁觀癡頑太重所以是般事本來具足不假修為今時人不了此事故他從上諸聖立種種名説種種法逗到如今總成病痛雖然不著本來衣猶是玄談意上堂僧問師唱誰家曲宗風嗣阿誰師云雨灑不溼鱗意氣天然別進云直截一路請師再垂師云天門山帶碧秋色暗中知僧喝師便打乃云秋風入慈昜天門山色換樓頭梧葉飄有眼如不見如不見一聲猿啼腸欲斷上堂祖不西來早有者場禍事何況西來如今諸方老宿事不獲已説箇有禪可參有道可學總是止啼之事若作實法商量未免道聽塗説大衆華嚴如是且道是禍事不是禍事起身云禍事禍事上堂問從上相傳一路請師直指師驀豎拂子進云謝師畣話師云不唱言前寧談句後進云不消彈指力樓閣參遍時師便打乃云不入彌勒樓閣怎見家珍未到華嚴聖門安知法要是以通方上士不拘一路一門向上衲僧不足一知一見若不如是焉得傳持如今大衆還知麼從來參遍處回首始知宗上堂雕砂無鏤玉之談落草垂道人之意諸仁者向者裏作麼生領會如領會得不枉親見作家不然大有事在解制上堂華嚴今朝解制兄弟東去西去雖則理合如斯華嚴一應分付遂高聲云者邊那邊更莫回顧卓拄杖喝一喝住澧州藥山禪院語録據室譙老師入室久矣今日重新據座就中一著乎坦見者不可錯過衆中有不錯過底麼僧便喝師云胡喝亂喝咄開盧上堂僧問大衆雲臻師登寶座主賓酬唱棒喝交馳畢竟明甚麼邊事師云此去龍潭不易進云意旨如何師云此去龍潭不易問龍天擁出為扶宗優鉢華開世罕逢今日升堂如何指示師云拄杖五尺長僧禮拜師便打乃云直指人心見性成佛先宗固是直截正眼看來卻似不是若是今日只須道箇青則青白則白噁雖然已是塗汙諸人了也良久云事無一向不見先藥山一笑應澧陽東去九十里許如是則新藥山開堂亦有一笑布施大衆不惟應澧陽千里萬里管教闔國人成祖成佛乃大笑云會麼便下座曰事上堂雨灑風飄古殿腳冬寒閉戶然枯竹何期撾鼓要升堂曳杖強登曲彔木打喊歡歡瞋火惡惡本欲為衆説法只是不成法度上堂僧問如何是清淨法身師云祇此一問也不消得進云怎知法身師云錯錯進云和尚分上即得師云錯錯乃云鼇山露遮那之體澧水瀉不二之音若人識得有口只堪挂壁若識不得總成孤負上堂壁侍者問古人升座不吐一辭此理還的當不師云毛吞巨海意乖卻本來真進云打得血流出如何瞋火然師云莫以荊山玉比作衣下珍者禮拜師打三棒乃云古人升座不説今人升座要説不説而説説而不説牆壁瓦礫放稿光妙惠空生何處著莫莫開眼也著合眼也著喝一喝上堂僧問如何是和尚垂示一路師便打進云不是某甲幾錯承當師云以其自足不如重出又打進云領領便歸衆師云可惜珍玉混泥沙乃云古佛心宗衲僧肝膽盡在一毛頭建立一毛頭收歸只是大衆未肯承當所以在者裏早上上來晚下下去不自回光卻成孤負故先宗道京都鄴都浩浩便是菩提大道大衆向者裏信去不可更疑若更疑驢年去在上堂大衆有甚麼事隔礙不如與麼去藥山在萬峰六年亦只與麼去若不與麼去不獨六年即六年又六年有甚了期雖從上有三祇果滿者有七破蒲團者有四十年不雜用心者有四十九年尚自走作者若不與麼去亦只是箇勞生老漢有甚可取大衆今日事不獲已乃説如是不可謂藥山重加箋注好上堂僧問動靜正移時本分落在甚麼處師云大地雪消去乾坤一片明進云意旨如何師云適來為女道破了也乃云識神種草糞掃堆裏薶卻千箇萬箇未為分外何故若是出格高流十年五載時節到來自然瞥地放出牚天拄地之手打開耀古騰今之焰不勞矢鏃海晏河清不動干戈太平坐致如此則超群越格即不無正恁麼時甚麼處安身立命卓拄杖一下師因患腳上堂有時節掉棒打月接竹點天有時節海晏河清風恬浪靜有時節哎喲此一句腳痛説不得便下座到龍潭寺上堂一潭煙景萬頃波光子規啼落楊華漁父全拋玉餌者箇竟界且置正與麼時如何指示燒經臺上浮青靄仙眠洲中落紫霞到夾山上堂未到夾山藥山便有許多隔礙及乎到來藥山隔礙全無既然不落兩塗一句作麼生道夾嶺雲生橫谷口藥山月出照丹霄上堂從上來也有打者也有喝者也有百般做出者也有一物不為者藥山今日點柬將來各欠寤在揮拂子云也是抑而為之上堂雪色媚諸峰湖光搖三楚若作佛法觀五五二十五拈拄杖卓一卓云大衆切忌茻鹵上堂一浦雲煙萬井冰雪玉樓人睡不知天曉瓊樹烏啼不知晴明林下道人當恁麼時喚作何事以杖卓一下云等間莫灑兩行淚恐染湘山竹上辨解制上堂九旬佛事今朝罷垂示諸人無別話東擲西拋任運行路逢死蛇莫打殺住新寧縣牛山廣福禪院語録據室從上宗師於此開蝦蟆口説一二三四五新廣福於此又説箇甚麼喝一喝云雲中才見傾雷雨澗底頻驚倒嶽機結制上堂僧問從上老和尚施設盡是節外生支和尚今日作麼生師揮拂子云廣福無法説拂子驀面揮進云早箇節外生支也師復揮拂子云莫孤山僧好乃驀豎拂子召衆云廣福三登中慶九上萬峰別無別得單只得此斷拂子一柄遇人問著便將指揮拂一拂云拂子頭上塵説剎説熾然説無間歇你道此斷拂子見箇甚麼道理便有如是神通如是妙用如是作為你也須出來道看既道不得不可草草且請出來秉戒王珍送子出家上堂僧問一子出家九族生天未審一子出家為甚九族便與麼去師云闍黎下一轉語看僧便喝師云退後退後乃云廣福説法無處啓口只好舉則古人因緣聊為證據道玄居士問馬祖不與萬法為侶者是甚麼人祖云待女一口吸盡西江水即向女道士於言下頓領玄旨有偈云有男不婚有女不嫁大家團圞頭共説無生話廣福論他千古之下雖是出群猶有不盡善處怎如思修居士也不恁麼問廣福也不恁麼畣自是另行一路何也他有男不婚無女不嫁何用團圞頭大家相接話雖然廣福敢問大衆且道此公與龐老用處是同是別出來對衆道看若道得堪為古今法眼設或不能不妨老實疑著好上堂黃面老人自謂成道於天竺雪峰老人自謂成道於鼇山今日不肖兒孫要問二老人成箇甚麼上堂僧問如何是提宗一句師云當機不唱無生曲進云早知是錯師打云跛鱉漫追蹤乃云者件大事佛祖唱不出辨才詮不出大衆疑不出廣福説不出惟有松風水月瓦塊磚頭草木叢林拄杖拂子當頭露布大衆直下領取更莫回顧上堂鵝城峰碧牛山咄青不是古佛螺髻亦非諸聖頂門昨夜文殊普賢疑到五更及至醒將起來依舊可憐生上堂僧問從上來事即不問如何是和尚家風師云一跛一跳進云莫便是不師云揚沙攃土底意非真僧禮拜師打乃云蜀魄啼柳莊蝶舞華若人於此聞得分明見得分明則不勞廣福鼓脣弄舌即與從上諸佛同一龕室不然孤負殺人解制上堂僧問如何是解制一句師云一聲牛背笛山山任遨遊乃云諸方浩浩商量且不是聚廣福人人解去且不是離若作聚三十棒打折驢腰若作離三十棒打折驢腰上堂神會圭峰尚斥為知解宗徒而泛泛字句支講者豈能善乎我此大衆倘有向上志五年十年不雜一語何愁不是佛不解語邪珍重上堂有句無句如藤倚樹樹倒藤枯句歸何處阿呵呵誰管你簇錦攢華阿呵呵誰管你倒腸括肚乃拍膝一下云東風昨夜向荊南千峰萬峰啼杜宇上堂萬法歸一刀刃上蜜舐著些兒血珠便滴陷虎機蠱毒食見者喪耳者死顧左右云且如何回避掌上縱有返魂香也須遠離三千里上堂拂子好打蠅拄杖好打狗若作佛法觀面南看北斗蘇州有常州有怎如山門前佛殿後上堂剋期取證非但高峰為然雪岩老人亦謂女等諸人若能七日夜脅不至席目不交眨一念無間若不會截取頭去做澆屎勺此法從來得驗者不可勝紀今諸人一夏又過半矣不惟沒有下落亦且妄想雲興若不出來提過期畢不得意又道長老不道軍中謝世上堂有時大聲喚有時小聲叫道是苦苦為甚與人同道不是苦苦濫泥有刺顧左右云知麼老僧無專墮向刀兵獄裏誰似三千年前雙林中右脅而臥喝一喝端坐而逝
